name: Moodle Plugin CI

# Runs moodle-plugin-ci checks (phplint, phpcs, phpdoc, validate, savepoints,
# mustache, grunt, phpunit, behat) against individual LernHive plugins when
# their files change. Each plugin is a separate matrix entry so a failure in
# one plugin does not hide failures in another.
#
# To add a new plugin to CI:
#   1. Add it to the matrix.include list below
#   2. Add its path to the `paths` filter on the `push` / `pull_request` triggers
#
# Docs: https://moodlehq.github.io/moodle-plugin-ci/

on:
  push:
    branches: [main]
    paths:
      - 'plugins/local_lernhive_contenthub/**'
      - 'plugins/local_lernhive_copy/**'
      - 'plugins/local_lernhive_library/**'
      - '.github/workflows/moodle-plugin-ci.yml'
  pull_request:
    paths:
      - 'plugins/local_lernhive_contenthub/**'
      - 'plugins/local_lernhive_copy/**'
      - 'plugins/local_lernhive_library/**'
      - '.github/workflows/moodle-plugin-ci.yml'
  workflow_dispatch:

# Never run two CI passes for the same ref at once — just cancel the older one.
concurrency:
  group: moodle-plugin-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plugin-ci:
    name: ${{ matrix.plugin }} / PHP ${{ matrix.php }} / ${{ matrix.moodle-branch }}
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - plugin: local_lernhive_contenthub
            plugin-path: plugins/local_lernhive_contenthub
            moodle-target: local/lernhive_contenthub
            php: '8.2'
            moodle-branch: 'MOODLE_405_STABLE'
            database: pgsql
          - plugin: local_lernhive_copy
            plugin-path: plugins/local_lernhive_copy
            moodle-target: local/lernhive_copy
            php: '8.2'
            moodle-branch: 'MOODLE_405_STABLE'
            database: pgsql
          - plugin: local_lernhive_library
            plugin-path: plugins/local_lernhive_library
            moodle-target: local/lernhive_library
            php: '8.2'
            moodle-branch: 'MOODLE_405_STABLE'
            database: pgsql

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: 'postgres'
          POSTGRES_HOST_AUTH_METHOD: 'trust'
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Check out the plugin repo
        uses: actions/checkout@v4
        with:
          path: monorepo

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pgsql, zip, gd, soap, xml, intl, mysqli
          ini-values: max_input_vars=5000
          coverage: none

      - name: Initialise moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist \
            moodlehq/moodle-plugin-ci ci ^4
          echo "$(cd ci/bin && pwd)" >> "$GITHUB_PATH"
          echo "$(cd ci/vendor/bin && pwd)" >> "$GITHUB_PATH"
          sudo locale-gen en_AU.UTF-8

      - name: Install Moodle + plugin into a throwaway tree
        env:
          DB: ${{ matrix.database }}
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}
          IGNORE_PATHS: docs
        run: |
          # moodle-plugin-ci expects the plugin to be the working directory.
          # In a monorepo we copy it into a standalone directory first so
          # the CI tool sees a single-plugin layout.
          cp -R "monorepo/${{ matrix.plugin-path }}" "$RUNNER_TEMP/${{ matrix.plugin }}"
          cd "$RUNNER_TEMP/${{ matrix.plugin }}"
          moodle-plugin-ci install --db-host=127.0.0.1

      - name: PHP Lint
        if: ${{ !cancelled() }}
        working-directory: ${{ runner.temp }}/${{ matrix.plugin }}
        run: moodle-plugin-ci phplint

      - name: PHP Copy/Paste Detector
        continue-on-error: true
        if: ${{ !cancelled() }}
        working-directory: ${{ runner.temp }}/${{ matrix.plugin }}
        run: moodle-plugin-ci phpcpd

      - name: PHP Mess Detector
        continue-on-error: true
        if: ${{ !cancelled() }}
        working-directory: ${{ runner.temp }}/${{ matrix.plugin }}
        run: moodle-plugin-ci phpmd

      - name: Moodle Code Checker
        if: ${{ !cancelled() }}
        working-directory: ${{ runner.temp }}/${{ matrix.plugin }}
        run: moodle-plugin-ci phpcs --max-warnings 0

      - name: Moodle PHPDoc Checker
        if: ${{ !cancelled() }}
        working-directory: ${{ runner.temp }}/${{ matrix.plugin }}
        run: moodle-plugin-ci phpdoc --max-warnings 0

      - name: Validating
        if: ${{ !cancelled() }}
        working-directory: ${{ runner.temp }}/${{ matrix.plugin }}
        run: moodle-plugin-ci validate

      - name: Check upgrade savepoints
        if: ${{ !cancelled() }}
        working-directory: ${{ runner.temp }}/${{ matrix.plugin }}
        run: moodle-plugin-ci savepoints

      - name: Mustache Lint
        if: ${{ !cancelled() }}
        working-directory: ${{ runner.temp }}/${{ matrix.plugin }}
        run: moodle-plugin-ci mustache

      - name: Grunt
        if: ${{ !cancelled() }}
        working-directory: ${{ runner.temp }}/${{ matrix.plugin }}
        run: moodle-plugin-ci grunt --max-lint-warnings 0

      - name: PHPUnit tests
        if: ${{ !cancelled() }}
        working-directory: ${{ runner.temp }}/${{ matrix.plugin }}
        run: moodle-plugin-ci phpunit --fail-on-warning

      - name: Behat features
        if: ${{ !cancelled() }}
        working-directory: ${{ runner.temp }}/${{ matrix.plugin }}
        run: moodle-plugin-ci behat --profile chrome
