<!doctype html>
<html><head><meta charset="utf-8"><title>Reporting Mockup</title>
<style>
body{font-family:Arial,sans-serif;background:#f5f7fa;padding:40px}
.grid{display:grid;grid-template-columns:repeat(3,260px);gap:18px}
.tile{background:#fff;border-radius:16px;padding:22px;box-shadow:0 3px 12px rgba(0,0,0,.08)}
.num{font-size:36px;font-weight:bold}
</style></head><body>
<h1>Reports</h1>
<div class="grid">
  <div class="tile"><div class="num">124</div><div>Users in my course</div></div>
  <div class="tile"><div class="num">7</div><div>Most popular courses</div></div>
  <div class="tile"><div class="num">62%</div><div>Course completion</div></div>
</div>
</body></html>
